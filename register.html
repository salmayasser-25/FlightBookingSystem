<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroFly | Join AeroFly+</title>

    <!-- Google Fonts: Gelasio + Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Gelasio:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5 CSS + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css" />
    <style>
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background-image: url('https://images.unsplash.com/photo-1542296332-2e4473faf563?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
            padding: 120px 0 60px;
        }
        .auth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(10, 37, 64, 0.9) 0%, rgba(26, 58, 95, 0.8) 100%);
        }
        .auth-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-xl);
            position: relative;
            z-index: 2;
        }
        .auth-card h2 {
            color: var(--primary-deep-blue);
            font-weight: 800;
            margin-bottom: 8px;
        }
        .auth-card p {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .auth-input-group {
            margin-bottom: 20px;
        }
        .auth-input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 8px;
            display: block;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--gray-200);
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all var(--transition-fast);
            background: var(--gray-50);
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--primary-sky);
            box-shadow: 0 0 0 3px rgba(45, 122, 159, 0.1);
            background: var(--white);
        }
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-gold), #B8942E);
            color: var(--primary-deep-blue);
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            transition: all var(--transition-fast);
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: linear-gradient(135deg, #B8942E, var(--accent-gold));
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--gray-600);
        }
        .auth-footer a {
            color: var(--primary-sky);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .row-inputs {
            display: flex;
            gap: 16px;
        }
        .row-inputs .auth-input-group {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
        <!-- NAVBAR -->
    <header class="site-header">
        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <div class="logo-wrapper">
                        <div class="logo-icon-custom" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; margin-right: 10px;">
                            <img src="globe.png" alt="AeroFly Logo" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
                        </div>
                        <div class="logo-text">
                            <span class="logo-main">AeroFly</span>
                            <span class="logo-tagline">premium airways</span>
                        </div>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <i class="bi bi-list"></i>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                        <li class="nav-item"><a class="nav-link" href="flight-status.html">Flight Status</a></li>
                        <li class="nav-item"><a class="nav-link" href="user-dashboard.html">My Trips</a></li>
                        <li class="nav-item ms-lg-2">
                            <a class="nav-link btn-outline-primary-custom" href="login.html">Sign In</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn-primary-solid" href="register.html">Join AeroFly+</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- AUTH SECTION -->
    <section class="auth-section">
        <div class="auth-overlay"></div>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="auth-card animate-fade-up">
                        <h2>Join AeroFly+</h2>
                        <p>Earn points, enjoy flexible bookings, and travel in style.</p>
                        
                        <form>
                            <div class="row-inputs">
                                <div class="auth-input-group">
                                    <label>First Name</label>
                                    <input type="text" class="auth-input" placeholder="e.g. John" required>
                                </div>
                                <div class="auth-input-group">
                                    <label>Last Name</label>
                                    <input type="text" class="auth-input" placeholder="e.g. Doe" required>
                                </div>
                            </div>
                            
                            <div class="auth-input-group">
                                <label>Email Address</label>
                                <input type="email" class="auth-input" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="auth-input-group">
                                <label>Password</label>
                                <input type="password" class="auth-input" placeholder="Create a strong password" required>
                            </div>
                            
                            <button type="submit" class="btn-auth mt-2">Create Account</button>
                        </form>
                        
                        <div class="auth-footer">
                            Already a member? <a href="login.html">Sign In</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
